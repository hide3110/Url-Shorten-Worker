<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Url-Shorten-Worker</title>

  <style>
    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      background: #f8f9fa;
      color: #212529;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    .page {
      width: 100%;
      max-width: 100%;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid rgba(0,0,0,.125);
      border-radius: 12px;
      box-shadow: 0 .5rem 1rem rgba(0,0,0,.08);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 16px;
      font-size: 1.1rem;
      font-weight: 600;
      border-bottom: 1px solid rgba(0,0,0,.125);
      background: #fff;
    }

    .card-body {
      padding: 16px;
      min-width: 0;
      max-width: 100%;
    }

    #html-preview {
      min-width: 0;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    #html-preview pre {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
      background: #f6f8fa;
      padding: 12px;
      border-radius: 8px;
    }

    #html-preview code {
      white-space: pre-wrap;
      word-break: break-word;
    }

    #html-preview img,
    #html-preview iframe,
    #html-preview video,
    #html-preview table {
      max-width: 100%;
    }

    #html-preview table {
      display: block;
      overflow-x: auto;
    }

    .github-link {
      display: inline-block;
      margin-top: 16px;
    }

    @media (max-width: 575.98px) {
      .page {
        padding: 10px;
      }

      .card-header,
      .card-body {
        padding-left: 12px;
        padding-right: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <div class="card-header">View MarkDown</div>
      <div class="card-body">
        <div id="html-preview"></div>

        <textarea id="longURL" readonly hidden>{__FINAL_LINK__}</textarea>

        <a class="github-link" href="https://github.com/hide3110/url-Shorten-Worker/" target="_self">
          Fork me on GitHub
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    // 把MarkDown文本转换为显示
    function syncMarkDownView() {
      const markdownContent = document.getElementById('longURL').value;
      const htmlPreview = document.getElementById('html-preview');
      htmlPreview.innerHTML = marked.parse(markdownContent);
    }

    document.addEventListener('DOMContentLoaded', function () {
      syncMarkDownView();
    });
  </script>
</body>
</html>
