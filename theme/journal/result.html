<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Url-Shorten-Worker</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body { padding: 12px; }
    .container {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 16px;
      overflow: hidden;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .content {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.7;
      font-size: 15px;
      font-family: inherit;
    }
    @media (max-width: 600px) {
      body { padding: 8px; }
      .container { padding: 12px; }
      .content { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">内容展示</div>
    <pre class="content">{__FINAL_LINK__}</pre>
  </div>
</body>
</html>
